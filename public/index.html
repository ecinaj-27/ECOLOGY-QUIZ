<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="entry-screen" class="screen active">
        <div class="panel">
          <h1>ECOLOGY AND ENVIRONMENTAL BIOLOGY QUIZ</h1>
          <p>Please enter your details to start the quiz.</p>
          <input
            id="name-input"
            type="text"
            placeholder="Name (SN, FN, MI) e.g., DELA CRUZ, JUAN"
            required
          />
          <input
            id="email-input"
            type="email"
            placeholder="Email address"
            required
          />
          <input
            id="section-input"
            type="text"
            placeholder="Block and Section (e.g. BMD 4-2 etc.)"
            required
          />
          <button id="start-btn">Start Quiz</button>
          <button type="button" onclick="window.location.href='/admin.html'">Login Admin</button>
        </div>
      </section>

      <section id="quiz-screen" class="screen hidden">
        <video id="bg-video" class="bg-video" autoplay muted loop playsinline preload="auto"></video>
        <div class="overlay">
          <div class="quiz-header">
            <span id="student-name-label"></span>
          </div>
          <div class="panel question-panel">
            <h2 id="question-title"></h2>
            <div id="choices" class="choices"></div>
            <div class="quiz-nav">
              <button id="back-btn" type="button">Back</button>
              <button id="next-btn" type="button">Next</button>
            </div>
            <div class="progress">
              <span id="question-index"></span>
            </div>
          </div>
        </div>
      </section>

      <section id="summary-screen" class="screen hidden">
        <div class="panel">
          <h2>Review Your Answers</h2>
          <p>Check your answers before submitting.</p>
          <div id="summary-breakdown"></div>
          <div class="quiz-nav">
            <button id="summary-back-btn" type="button">Back to Quiz</button>
            <button id="submit-btn" type="button">Submit Quiz</button>
          </div>
        </div>
      </section>

      <section id="result-screen" class="screen hidden">
        <div class="panel">
          <h2>Quiz Complete</h2>
          <p id="result-student"></p>
          <p id="result-score"></p>
          <div id="result-breakdown"></div>
          <button id="restart-btn">Restart</button>
        </div>
      </section>
    </main>

    <audio id="bg-audio" src="/assets/audio/background.mp3" loop></audio>
    <script src="/js/app.js"></script>
  </body>
</html>
